name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  go:
    name: Go tests + WASM compile-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: go mod tidy
        run: go mod tidy

      - name: Verify go.mod / go.sum unchanged
        run: |
          if [ -n "$(git status --porcelain go.mod go.sum)" ]; then
            echo "go.mod / go.sum drifted — run 'go mod tidy' locally"
            git diff go.mod go.sum
            exit 1
          fi

      - name: Unit tests
        run: go test -race -v ./...

      - name: WASM compile-check
        run: GOOS=js GOARCH=wasm go build -o /dev/null ./...

  ts:
    name: TypeScript build + tests
    runs-on: ubuntu-latest
    needs: go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build WASM (produces dist/ that TS tests may reference)
        run: make wasm

      - name: TypeScript tests
        run: pnpm test:run

      - name: TypeScript build
        run: pnpm run build:ts
